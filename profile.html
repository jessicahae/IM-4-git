<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
</head>

<body>
  <header class="app-header">
    <a href="index.html" class="brand-link">
      <img src="img/logo.png" alt="Folle Vindl Logo" class="app-logo" />
      <h1>Folle Vindl</h1>
    </a>
    <a href="profile.html" class="profile-link active">Profil</a>
  </header>

  <main class="profile-page">
    <h2>Profil von <span id="profileTitleName"></span></h2>

    <section class="profile-avatar-section">
<img src="img/avatar-1.png" alt="Profilbild" class="profile-avatar" id="profileAvatar" />

<button type="button" class="profile-primary-button" id="showAvatarOptions">
  Profilbild ändern
</button>

<div class="avatar-options" id="avatarOptions" hidden>
  <button type="button" data-avatar="avatar-1.png"><img src="img/profile/avatar-1.png" alt="Avatar 1"></button>
  <button type="button" data-avatar="avatar-2.png"><img src="img/profile/avatar-2.png" alt="Avatar 2"></button>
  <button type="button" data-avatar="avatar-3.png"><img src="img/profile/avatar-3.png" alt="Avatar 3"></button>
  <button type="button" data-avatar="avatar-4.png"><img src="img/profile/avatar-4.png" alt="Avatar 4"></button>
</div>

    </section>

    <section class="profile-section">
      <div class="section-title">
        <span class="profile-icon">☺</span>
        <h3>Kinder</h3>
      </div>

      <div id="profileChildrenList"></div>

      <p class="profile-help-text">Kinder hinzufügen: Dashboard → Kinder → Hinzufügen</p>
    </section>

    <section class="profile-section">
      <div class="section-title">
        <span class="profile-icon">▣</span>
        <h3>Vorrat-Sensor</h3>
      </div>

      <div id="stockSensorList"></div>

      <form class="add-stock-sensor-form" id="addStockSensorForm" hidden>
        <input type="text" id="stockSensorNumber" placeholder="Sensor-Nummer" required />
        <div class="form-actions">
          <button type="submit">Speichern</button>
          <button type="button" id="cancelStockSensor">Abbrechen</button>
        </div>
      </form>

      <button type="button" class="profile-primary-button" id="showStockSensorForm">
        + Vorrat-Sensor hinzufügen
      </button>
    </section>

    <section class="profile-section">
      <div class="section-title">
        <span class="profile-icon">♙</span>
        <h3>Benutzerdaten</h3>
      </div>

      <form class="profile-form" id="userForm">
        <label for="username">Benutzername</label>
        <input type="text" id="username" value="Max Mustermann" />

        <label for="profileEmail">E-Mail</label>
        <input type="email" id="profileEmail" value="max@example.com" />

        <label for="profilePassword">Passwort</label>
        <input type="password" id="profilePassword" value="12345678" />

        <button type="submit" class="profile-primary-button">Speichern</button>
      </form>
    </section>

    <button id="logoutBtn" type="button" class="logout-button">↪ Abmelden</button>
  </main>

  <nav class="bottom-nav">
    <a href="index.html">Dashboard</a>
    <a href="profile.html" class="active">Profil</a>
  </nav>

  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/logout.js"></script>
</body>


</html>
