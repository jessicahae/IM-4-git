<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
</head>

<body>
  <header class="app-header">
    <img src="img/logo.png" alt="Folle Vindl Logo" class="app-logo" />
    <h1>Folle Vindl</h1>
    <a href="profile.html" class="profile-link">Profil</a>
  </header>

  <main class="dashboard">
    <h2>Dashboard</h2>

    <section class="dashboard-section children-section">
      <h3>Kinder</h3>

      <div class="children-switcher" id="childrenSwitcher">
        <button type="button" class="add-child-button" id="showAddChildForm">+ Hinzufügen</button>
      </div>

      <form class="add-child-form" id="addChildForm" hidden>
        <input type="text" id="childName" placeholder="Name des Kindes" required />
        <input type="text" id="sensorId" placeholder="Sensor-ID" required />

        <div class="form-actions">
          <button type="submit">Speichern</button>
          <button type="button" id="cancelAddChild">Abbrechen</button>
        </div>
      </form>
    </section>

    <section class="dashboard-section diaper-status-section status-dry">
      <div class="section-title">
        <img src="img/logo.png" alt="Windel" />
        <h3>Windel-Status: <span class="childNameDisplay"></span></h3>
      </div>

      <div class="status-options">
        <div class="status-box active">Trocken</div>
        <div class="status-box">Nass</div>
        <div class="status-box">Voll</div>
      </div>

    </section>

    <section class="dashboard-section stock-section">
      <div class="section-title">
        <span class="vorrat-icon"> <img src="img/icon_vorratbox.png" alt="Kartonbox"></span>
        <h3>Vorrat</h3>
      </div>

      <div class="stock-grid">
        <article class="info-box">
          <p>Aktueller Bestand</p>
          <strong id="display-bestand">... lade</strong>
        </article>

        <article class="info-box">
          <p>Ø Verbrauch/Tag</p>
          <strong id="display-verbrauch">...</strong>
        </article>

        <article class="info-box wide">
          <p>Reicht für</p>
          <strong id="display-reichweite">...</strong>
        </article>
      </div>


      <div class="stock-status">Status: Bald nötig</div>

      <p class="sensor-note">Vorrat wird automatisch vom Sensor erfasst</p>
    </section>

    <section class="dashboard-section statistics-section">
      <div class="section-title">
        <span class="sketch-icon">↗</span>
        <h3>Statistik:<span class="childNameDisplay"></span></h3>
      </div>

      <div class="statistics-grid">
        <article class="info-box">
          <p>Heute</p>
          <strong id="diapersToday">...</strong>
        </article>

        <article class="info-box">
          <p>Diese Woche</p>
          <strong id="diapersWeek">...</strong>
        </article>
      </div>

      <section class="chart-section">
        <h3>Windeln pro Tag: <span class="childNameDisplay"></span></h3>
        <div class="chart-wrapper">
          <canvas id="diaperChart"></canvas>
        </div>
      </section>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="active">Dashboard</a>
    <a href="profile.html">Profil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/index.js"></script>
</body>


</html>
