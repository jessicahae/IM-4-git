<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <img src="img/kind mit windel.png" alt="Kind mit Windel" />
    <h1>Folle Vindl</h1>
    <h2>Windel-Überwachung für junge Eltern</h2>

    <form id="loginForm">
      <div>
        <label>Email</label>
        <input type="email" id="email" required />
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="password" required />
      </div>
      <button type="submit">Anmelden</button>
      <button type="button" id="register">Registrieren</button>
    </form>

    <script src="js/login.js"></script>
  </body>
</html>
