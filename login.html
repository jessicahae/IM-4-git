<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>Login</h1>

    <form id="loginForm">

        <div>
            <label for="">Password</label>
            <input type="password" id="password" required />

        <button type="submit">Login</button>
    </form>


    <script src="js/login.js"> </script>
</body>
</html>
